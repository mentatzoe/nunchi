name: Release

# Build distributions on any v* tag and publish them to PyPI via Trusted
# Publishing (OIDC) — no long-lived API token exists anywhere. TurnAware is
# stdlib-only, so the build needs no extra wheels.
#
# PyPI-side setup (one-time, project owner): pypi.org -> account -> Publishing
# -> add a (pending) trusted publisher with owner=mentatzoe, repo=turnaware,
# workflow=release.yml, environment=pypi. Until that exists, the build job
# stays green (tagging always yields the dist artifact) and the publish job
# fails loudly instead of silently skipping.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install the build frontend
        run: pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Upload distributions as a workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: turnaware-dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # OIDC token for PyPI Trusted Publishing; the build job never has it.
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v7
        with:
          name: turnaware-dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
