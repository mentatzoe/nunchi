name: nunchi-gate
version: 2.0.0
description: >
  Canonical Nunchi V2 participant integration for Hermes 0.19.0. It binds exact
  profile and transport identity, retains bounded room observation, schedules
  one attention opportunity, and admits zero or one normal act-or-silence turn.
provides_hooks:
  - pre_gateway_dispatch
  - pre_llm_call
provides_middleware:
  - tool_execution
