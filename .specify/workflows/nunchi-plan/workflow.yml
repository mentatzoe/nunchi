schema_version: "1.0"
workflow:
  id: "nunchi-plan"
  name: "Nunchi Planning-Only Slice Cycle"
  version: "1.0.0"
  author: "Nunchi"
  description: "Specify through analysis without any product implementation step"

requires:
  speckit_version: "==0.12.11"
  integrations:
    any:
      - "codex"
      - "claude"

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe the umbrella program or bounded slice"
  integration:
    type: string
    default: "auto"
    prompt: "Integration to use ('auto' uses the repository default)"

steps:
  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-spec
    type: gate
    message: "Review scope, one owner lane, dependencies, interfaces, Goal boundary, and control-plane-only compliance."
    options: [approve, reject]
    on_reject: abort

  - id: clarify
    command: speckit.clarify
    integration: "{{ inputs.integration }}"
    input:
      args: "Resolve material ambiguity without revisiting selected product decisions."

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "Plan only; all future product artifacts target ordinary repository paths."

  - id: review-plan
    type: gate
    message: "Review dependency order, interfaces, integration strategy, acceptance scenes, and evidence requirements."
    options: [approve, reject]
    on_reject: abort

  - id: checklist
    command: speckit.checklist
    integration: "{{ inputs.integration }}"
    input:
      args: "Formal reviewer checklist for requirement quality and governance boundaries."

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "Generate future Goal 2 tasks only; do not execute them."

  - id: analyze
    command: speckit.analyze
    integration: "{{ inputs.integration }}"
    input:
      args: "Treat constitution conflicts and CRITICAL/HIGH findings as blockers."

  - id: planning-exit
    type: gate
    message: "Planning is ready only with zero CRITICAL/HIGH findings. This workflow stops here and grants no implementation authority."
    options: [approve, reject]
    on_reject: abort
