schema_version: "1.0"
workflow:
  id: "nunchi-plan"
  name: "Nunchi Existing-Slice Planning Cycle"
  version: "1.4.0"
  author: "Nunchi"
  description: "Review and plan one existing V2 slice through analysis, with no implementation step"

requires:
  speckit_version: "==0.12.11"
  integrations:
    any:
      - "codex"
      - "claude"

inputs:
  slice_directory:
    type: string
    required: true
    prompt: "Exact existing slice directory, for example specs/030-v2-core-attention"
  integration:
    type: string
    default: "auto"
    prompt: "Integration to use ('auto' uses the repository default)"

steps:
  - id: bind-existing-slice
    type: gate
    message: "SLICE BINDING: this workflow must have been launched through python3 scripts/run_slice_workflow.py run nunchi-plan {{ inputs.slice_directory }}. The wrapper allowlists and preflights that exact existing 010-110 slice, sets SPECIFY_FEATURE_DIRECTORY in the workflow process, pins the run input and workflow digest, and leaves .specify/feature.json unchanged. Resume only through the same wrapper. Do not create or select a replacement feature."
    options: [approve, reject]
    on_reject: abort

  - id: review-spec
    type: gate
    message: "Review the bound existing slice's scope, owner lane, assigned participant/source, dependencies, interfaces, lifecycle state, control-plane-only compliance, and explicit README/docs freshness dispositions."
    options: [approve, reject]
    on_reject: abort

  - id: clarify
    command: speckit.clarify
    integration: "{{ inputs.integration }}"
    input:
      args: "Resolve material ambiguity without revisiting selected product decisions."

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "Plan only; all future product artifacts target ordinary repository paths. Include an exact file-by-file README/docs impact matrix using UPDATE, NO_IMPACT, or HANDOFF; generic directories are invalid when paths are known."

  - id: review-plan
    type: gate
    message: "Review dependency order, interfaces, integration strategy, acceptance scenes, evidence requirements, and non-generic documentation impact."
    options: [approve, reject]
    on_reject: abort

  - id: checklist
    command: speckit.checklist
    integration: "{{ inputs.integration }}"
    input:
      args: "Formal reviewer checklist for requirement quality, governance boundaries, and documentation freshness dispositions."

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "Generate dormant slice implementation tasks only; include activation prerequisites plus blocking README/docs disposition, validation, evidence, and handoff tasks; do not execute them."

  - id: analyze
    command: speckit.analyze
    integration: "{{ inputs.integration }}"
    input:
      args: "Treat constitution conflicts, missing or bare documentation dispositions, and CRITICAL/HIGH findings as blockers."

  - id: planning-exit
    type: gate
    message: "Planning is ready only with zero CRITICAL/HIGH findings and exact README/docs dispositions, owners, validation, and handoff evidence. This workflow stops here and grants no implementation authority."
    options: [approve, reject]
    on_reject: abort
