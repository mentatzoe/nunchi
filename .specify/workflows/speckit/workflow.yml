schema_version: "1.0"
workflow:
  id: "speckit"
  name: "Nunchi Governed Slice Cycle"
  version: "2.0.0"
  author: "Nunchi"
  description: "Full slice cycle with requirements gates and explicit Goal 2 authorization before implementation"

requires:
  speckit_version: "==0.12.11"
  integrations:
    any:
      - "codex"
      - "claude"

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe the bounded slice"
  integration:
    type: string
    default: "auto"
    prompt: "Integration to use ('auto' uses the repository default)"

steps:
  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-spec
    type: gate
    message: "Review scope, single owner, dependencies, interfaces, Goal boundary, and control-plane-only compliance."
    options: [approve, reject]
    on_reject: abort

  - id: clarify
    command: speckit.clarify
    integration: "{{ inputs.integration }}"
    input:
      args: "Resolve only material ambiguity; preserve the selected Vault design."

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "Use the Nunchi control-plane template; do not create product contracts, schemas, tests, evals, evidence, or docs under specs/."

  - id: review-plan
    type: gate
    message: "Review dependency order, ordinary-path targets, integration strategy, acceptance scenes, and evidence requirements."
    options: [approve, reject]
    on_reject: abort

  - id: checklist
    command: speckit.checklist
    integration: "{{ inputs.integration }}"
    input:
      args: "Formal reviewer checklist for scope, parity, interface, evidence, and control-plane boundary requirements."

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "Generate dependency-ordered tasks with ordinary repository paths and explicit handoff evidence."

  - id: analyze
    command: speckit.analyze
    integration: "{{ inputs.integration }}"
    input:
      args: "Treat every constitution conflict and any CRITICAL/HIGH finding as blocking."

  - id: review-analysis
    type: gate
    message: "Stop unless analysis has zero CRITICAL/HIGH findings and the accountable owner and dependencies are ready."
    options: [approve, reject]
    on_reject: abort

  - id: goal-2-authorization
    type: gate
    message: "IMPLEMENTATION AUTHORITY: approve only when Zoe has separately set Goal 2 for this V2 program. Goal 1 never satisfies this gate."
    options: [approve, reject]
    on_reject: abort

  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    input:
      args: "Implement only this owner lane, in an isolated worktree, using ordinary product paths."

  - id: converge
    command: speckit.converge
    integration: "{{ inputs.integration }}"
    input:
      args: "Reconcile implementation, tasks, tests, evidence, and limitations without broadening scope or claiming incomplete work."

  - id: integration-handoff
    type: gate
    message: "Accept only with commit, commands, evidence paths, interface versions, provenance, and known limitations handed to the named integrator."
    options: [approve, reject]
    on_reject: abort
