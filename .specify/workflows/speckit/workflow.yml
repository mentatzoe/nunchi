schema_version: "1.0"
workflow:
  id: "speckit"
  name: "Nunchi Governed Slice Cycle"
  version: "2.1.0"
  author: "Nunchi"
  description: "Full slice cycle with Goal 2 authorization and a blocking documentation-freshness gate"

requires:
  speckit_version: "==0.12.11"
  integrations:
    any:
      - "codex"
      - "claude"

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe the bounded slice"
  integration:
    type: string
    default: "auto"
    prompt: "Integration to use ('auto' uses the repository default)"

steps:
  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-spec
    type: gate
    message: "Review scope, single owner, dependencies, interfaces, Goal boundary, control-plane-only compliance, and explicit README/docs freshness dispositions."
    options: [approve, reject]
    on_reject: abort

  - id: clarify
    command: speckit.clarify
    integration: "{{ inputs.integration }}"
    input:
      args: "Resolve only material ambiguity; preserve the selected Vault design."

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "Use the Nunchi control-plane template; do not create product contracts, schemas, tests, evals, evidence, or docs under specs/. Include an exact file-by-file README/docs impact matrix using UPDATE, NO_IMPACT, or HANDOFF; generic directories are invalid when paths are known."

  - id: review-plan
    type: gate
    message: "Review dependency order, ordinary-path targets, integration strategy, acceptance scenes, evidence requirements, and non-generic documentation impact."
    options: [approve, reject]
    on_reject: abort

  - id: checklist
    command: speckit.checklist
    integration: "{{ inputs.integration }}"
    input:
      args: "Formal reviewer checklist for scope, parity, interface, evidence, documentation freshness, and control-plane boundary requirements."

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "Generate dependency-ordered tasks with ordinary repository paths, exact README/docs disposition and validation tasks, and explicit handoff evidence."

  - id: analyze
    command: speckit.analyze
    integration: "{{ inputs.integration }}"
    input:
      args: "Treat every constitution conflict, missing or bare documentation disposition, and any CRITICAL/HIGH finding as blocking."

  - id: review-analysis
    type: gate
    message: "Stop unless analysis has zero CRITICAL/HIGH findings and the accountable owner and dependencies are ready."
    options: [approve, reject]
    on_reject: abort

  - id: goal-2-authorization
    type: gate
    message: "IMPLEMENTATION AUTHORITY: approve only when Zoe has separately set Goal 2 and that external grant is validly recorded at evidence/governance/v2-goal-2-authorization.md before any task is checked. The record documents authority; it does not grant it. Goal 1 never satisfies this gate."
    options: [approve, reject]
    on_reject: abort

  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    input:
      args: "Implement only this owner lane, in an isolated worktree, using ordinary product paths. Execute the planned README/docs dispositions and validation as implementation work."

  - id: converge
    command: speckit.converge
    integration: "{{ inputs.integration }}"
    input:
      args: "Reconcile implementation, tasks, tests, evidence, README/docs dispositions, and limitations without broadening scope or claiming incomplete work."

  - id: documentation-freshness
    type: gate
    message: "DOCUMENTATION FRESHNESS: accept only when the exact candidate reviewed README.md and every exact affected ordinary-doc path; directory wildcards are invalid when files are known, UPDATE rows landed and were validated, NO_IMPACT rows list exact paths and concrete rationale in handoff evidence, and HANDOFF rows name the exact delta and accepting owner."
    options: [approve, reject]
    on_reject: abort

  - id: integration-handoff
    type: gate
    message: "Accept only with commit, commands, evidence paths, interface versions, provenance, documentation dispositions/validation, and known limitations handed to the named integrator."
    options: [approve, reject]
    on_reject: abort
